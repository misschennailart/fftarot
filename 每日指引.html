    const { useState, useEffect } = React;

    const luckyColors = ['晨曦黃', '薄荷綠', '玫瑰石英粉', '寧靜藍', '珍珠白', '薰衣草紫', '大地棕', '珊瑚橘', '深海藍', '翡翠綠'];
    const healingQuotes = [
      '每一次呼吸，都是宇宙給予的全新機會。',
      '放下不必要的執著，你會發現手中握著更多的自由。',
      '溫柔地對待自己，你比想像中還要勇敢。',
      '所有的發生，都是為了引領你走向更好的地方。',
      '在靜默中傾聽，內心的聲音會為你指路。',
      '相信過程，花朵有它自己綻放的時間。',

    ];

    // === 元素與數字學解析資料庫 (已精簡) ===
    const elementData = {
      'Major': '大阿爾克那代表宇宙的法則與重大課題。請以更宏觀的視角看待今日的處境。',
      'Wands': '權杖對應「火元素」，象徵行動力與熱情。宇宙呼喚您採取主動，用活力突破現狀。',
      'Cups': '聖杯對應「水元素」，象徵情感與潛意識。請運用柔軟的態度、傾聽直覺，關注內心感受。',
      'Swords': '寶劍對應「風元素」，象徵理智與思考。面對問題請保持頭腦清晰，用客觀分析斬斷迷惘。',
      'Pentacles': '錢幣對應「土元素」，象徵物質與現實。請將焦點放回現實層面，一步一腳印地務實行動。'
    };

    const numerologyData = {
      '1': '數字 1 象徵核心能量的爆發與純粹的新開始。',
      '2': '數字 2 代表選擇、平衡，以及關係的建立與磨合。',
      '3': '數字 3 象徵初步成果與向外擴張，能量正在發展。',
      '4': '數字 4 代表穩定、安全感，但也需留意是否過於固執。',
      '5': '數字 5 象徵挑戰與改變，是一個必經的動盪過渡期。',

      '7': '數字 7 象徵評估、反思，以及尋求更深層的智慧。',

      '10': '數字 10 象徵循環的結束，同時為下一個新循環做準備。',
      'Page': '侍者代表新消息、好奇心與單純的初階能量。',

    // === 塔羅牌資料庫生成 ===
    const generateDeck = () => {
      const deck = [
        { id: 0, numeral: '0', name: '愚者', en: 'The Fool', keywords: '新的開始、純真、冒險、無限潛力', description: '放下過去的包袱，帶著輕鬆的心情踏上新的旅程。這是一段不計後果、相信宇宙安排的純粹冒險，請保持開放與好奇。', symbol: '🌟', advice: '保持開放的心態，不要害怕未知的改變，勇敢邁出第一步。', element: 'Major', rank: '0' },
        { id: 1, numeral: 'I', name: '魔術師', en: 'The Magician', keywords: '創造力、意志力、顯化、資源', description: '你已經具備了實現夢想的所有工具與資源。現在是採取行動、將想法化為現實的絕佳時刻，宇宙的能量正為你所用。', symbol: '🌟', advice: '善用您現有的資源與才華，主動出擊去創造屬於你的機會。', element: 'Major', rank: '1' },
        { id: 2, numeral: 'II', name: '女祭司', en: 'The High Priestess', keywords: '直覺、潛意識、內在智慧、靜止', description: '向內尋求答案。現在不適合急躁行動，而是應該靜下來，傾聽你內在的聲音與直覺，有些隱藏的真相正在浮現。', symbol: '🌟', advice: '相信您的直覺與潛意識，答案其實已經在您的心中。', element: 'Major', rank: '2' },
        { id: 3, numeral: 'III', name: '皇后', en: 'The Empress', keywords: '豐盛、孕育、愛與美、自然', description: '去感受生活中的美好與豐盛。這是一段適合滋養自己、照顧他人，並讓事物自然生長的時期，充滿了愛與包容。', symbol: '🌟', advice: '對自己好一點，用愛與溫柔去包容現狀，享受生命的美好。', element: 'Major', rank: '3' },
        { id: 4, numeral: 'IV', name: '皇帝', en: 'The Emperor', keywords: '秩序、結構、領導力、權威', description: '建立穩固的基礎與秩序。你需要運用理智與紀律來掌控局面，為你的目標制定清晰且務實的計畫。', symbol: '🌟', advice: '建立規則與界線，用理智與務實的態度去處理眼前的問題。', element: 'Major', rank: '4' },
        { id: 5, numeral: 'V', name: '教皇', en: 'The Hierophant', keywords: '傳統、學習、精神指引、信仰', description: '遵循傳統或尋求專業人士的建議。這是一個適合學習、進修，或是尋求心靈導師與體制內指引的階段。', symbol: '🌟', advice: '尋求長輩或專業人士的建議，暫時走穩定的常規路線會比較順利。', element: 'Major', rank: '5' },
        { id: 6, numeral: 'VI', name: '戀人', en: 'The Lovers', keywords: '愛、和諧、選擇、價值觀', description: '建立深刻的連結，無論是感情還是合作夥伴。同時，這也暗示你面臨著一個需要真心對待、價值觀契合的重要選擇。', symbol: '🌟', advice: '順從您的真心做出選擇，尋求人際關係與自我內心的和諧。', element: 'Major', rank: '6' },
        { id: 7, numeral: 'VII', name: '戰車', en: 'The Chariot', keywords: '意志、克服困難、前進、勝利', description: '集中你的意志力，駕馭內在的衝突。只要保持高度的專注與決心，你就能克服眼前的障礙，迅速向前推進。', symbol: '🌟', advice: '堅持到底，掌控好自己的情緒與方向，不要被眼前的阻礙打敗。', element: 'Major', rank: '7' },
        { id: 8, numeral: 'VIII', name: '力量', en: 'Strength', keywords: '勇氣、耐心、柔性力量、同理心', description: '真正的力量來自於內心的溫柔與耐心，而非外在的強迫。用愛與包容去面對恐懼與挑戰，你能輕易安撫狂躁。', symbol: '🌟', advice: '以柔克剛，用耐心與包容去化解衝突，你比想像中更堅強。', element: 'Major', rank: '8' },
        { id: 9, numeral: 'IX', name: '隱者', en: 'The Hermit', keywords: '獨處、反省、內在指引、尋求真理', description: '暫時遠離外界的喧囂，給自己一些獨處的時間。在寧靜中回顧過去，點亮內在的明燈，尋找下一步的方向。', symbol: '🌟', advice: '給自己一些獨處沉澱的時間，重新釐清自己真正渴望的方向。', element: 'Major', rank: '9' },
        { id: 10, numeral: 'X', name: '命運之輪', en: 'Wheel of Fortune', keywords: '轉機、循環、順勢而為、業力', description: '生命是不斷循環的，一個無法避免的改變即將到來。接受命運的安排，順應生命的流動，好運正在轉向你。', symbol: '🌟', advice: '順應局勢的變化，不要抗拒，請把握即將到來的轉機。', element: 'Major', rank: '10' },
        { id: 11, numeral: 'XI', name: '正義', en: 'Justice', keywords: '平衡、客觀、真相、因果', description: '為自己的行為負責，尋求公平與平衡。用理智與客觀的態度來評估現狀，種下什麼因，就會結什麼果。', symbol: '🌟', advice: '保持客觀理智，做出不偏不倚的決斷，誠實面對自己。', element: 'Major', rank: '11' },
        { id: 12, numeral: 'XII', name: '倒吊人', en: 'The Hanged Man', keywords: '暫停、換位思考、犧牲、新視角', description: '接受目前的停滯，這是一個轉換視角的絕佳機會。學會放下控制欲，用不同的角度看待事物，你會獲得頓悟。', symbol: '🌟', advice: '換個角度看事情，有時候退一步或暫時妥協，海闊天空。', element: 'Major', rank: '12' },
        { id: 13, numeral: 'XIII', name: '死神', en: 'Death', keywords: '結束、轉變、放手、重生', description: '一個階段的必然結束，意味著新階段的開始。勇敢地放下不再適合你的事物，為新的生機騰出空間。', symbol: '🌟', advice: '勇敢斷捨離，舊有的結束才能帶來嶄新的開始。', element: 'Major', rank: '13' },
        { id: 14, numeral: 'XIV', name: '節制', en: 'Temperance', keywords: '平衡、調和、療癒、耐心', description: '在不同的極端之間尋找最佳的平衡點。這是一個療癒與資源融合的過程，保持耐心，讓事物自然發酵。', symbol: '🌟', advice: '避免走極端，在中庸之道與妥協裡找到內心的平靜與進展。', element: 'Major', rank: '14' },
        { id: 15, numeral: 'XV', name: '惡魔', en: 'The Devil', keywords: '束縛、誘惑、陰暗面、物質沉迷', description: '正視自己內心的恐懼與過度的執著。你可能被某些壞習慣或物質欲望所束縛，意識到這些限制，是重獲自由的第一步。', symbol: '🌟', advice: '看清眼前的誘惑與不健康的執念，勇敢切斷有害的連結。', element: 'Major', rank: '15' },
        { id: 16, numeral: 'XVI', name: '高塔', en: 'The Tower', keywords: '突變、破壞、解放、真相大白', description: '突如其來的劇變會打破現有的安穩，摧毀虛假的基礎。雖然過程震撼，但在廢墟中你將看見真實並獲得徹底解放。', symbol: '🌟', advice: '接受突如其來的改變，這是摧毀錯覺、重建穩固基礎的契機。', element: 'Major', rank: '16' },
        { id: 17, numeral: 'XVII', name: '星星', en: 'The Star', keywords: '希望、療癒、靈感、寧靜', description: '風暴過後帶來了希望與平靜的星光。敞開心胸接受宇宙的療癒，你的未來充滿了光明、靈感與和平。', symbol: '🌟', advice: '保持希望與樂觀，宇宙正在為您引路，請相信美好的未來。', element: 'Major', rank: '17' },
        { id: 18, numeral: 'XVIII', name: '月亮', en: 'The Moon', keywords: '不安、潛意識、直覺、幻覺', description: '事物可能不如表面所見，潛意識的恐懼與不安正在浮現。相信你的直覺，小心且耐心地穿越這段迷惘的時期。', symbol: '🌟', advice: '面對內心的恐懼與不安，不要急著做決定，等候真相自然浮現。', element: 'Major', rank: '18' },
        { id: 19, numeral: 'XIX', name: '太陽', en: 'The Sun', keywords: '成功、喜悅、活力、清晰', description: '光明驅散了黑暗，帶來了純粹的活力與成功。這是一個充滿喜悅、清晰與自信的時刻，盡情展現你的光芒吧。', symbol: '🌟', advice: '保持熱情與自信，好運與喜悅將伴隨您，大膽前進。', element: 'Major', rank: '19' },
        { id: 20, numeral: 'XX', name: '審判', en: 'Judgement', keywords: '覺醒、召喚、寬恕、重生', description: '內在的覺醒與靈魂的召喚。這是一個反思過去、原諒自己與他人，並準備迎接全新生活層次的重要時刻。', symbol: '🌟', advice: '原諒過去的自己與他人，聆聽內心的呼喚，迎接心靈的覺醒。', element: 'Major', rank: '20' },
        { id: 21, numeral: 'XXI', name: '世界', en: 'The World', keywords: '圓滿、完成、整合、完美', description: '一個長期的旅程或目標即將圓滿達成。你已經整合了所有的經驗，準備好迎接下一個更高層次的生命循環。', symbol: '🌟', advice: '享受您努力得來的成果，一切即將圓滿，為下一個旅程做好準備。', element: 'Major', rank: '21' }
      ];

      const suitsData = {
        'Wands': { name: '權杖', symbol: '🪵' },
        'Cups': { name: '聖杯', symbol: '🏆' },
        'Swords': { name: '寶劍', symbol: '⚔️' },
        'Pentacles': { name: '錢幣', symbol: '🪙' }

      const ranksList = [
        { r: '1', n: '一', e: 'Ace' }, { r: '2', n: '二', e: 'Two' }, { r: '3', n: '三', e: 'Three' },
        { r: '4', n: '四', e: 'Four' }, { r: '5', n: '五', e: 'Five' }, { r: '6', n: '六', e: 'Six' },
        { r: '7', n: '七', e: 'Seven' }, { r: '8', n: '八', e: 'Eight' }, { r: '9', n: '九', e: 'Nine' },
        { r: '10', n: '十', e: 'Ten' }, { r: 'Page', n: '侍者', e: 'Page' }, { r: 'Knight', n: '騎士', e: 'Knight' },
        { r: 'Queen', n: '王后', e: 'Queen' }, { r: 'King', n: '國王', e: 'King' }
      ];

      const minorContent = {
        'Wands': [
          { k: '靈感、新行動、潛力', d: '這是一個充滿創意與熱情的全新開始。你內在的火花已經點燃，具備了無限的發展潛力。', a: '把握當下的靈感與直覺，大膽地踏出行動的第一步。' },
          { k: '規劃、決定、遠見', d: '站在已有的基礎上眺望遠方。你正面臨選擇：是留在舒適圈，還是勇敢踏出未知的世界去擴張版圖？', a: '不要滿足於現狀，勇敢地為未來的擴張做出明確的決定與規劃。' },
          { k: '探索、擴展、看見回報', d: '你的努力開始看見初步的回報。現在是展望未來、向外探索，並準備迎接船隻回港的時刻。', a: '保持宏觀的視野，你的計畫正在順利推進，繼續擴展你的版圖。' },
          { k: '慶祝、和諧、穩定、歸屬', d: '這是一個階段性的成功與歡樂時刻，象徵著和諧的環境、穩定的基礎，以及與身邊人的慶祝。', a: '停下腳步享受目前的成就，與你愛的人共同分享這份喜悅與安定。' },
          { k: '競爭、衝突、挑戰、分歧', d: '你可能正面臨一些小型的爭執、意見分歧或良性競爭。每個人都想表達自己，導致場面混亂。', a: '保持冷靜，將這種混亂轉化為建設性的討論，而非互相攻擊。' },
          { k: '勝利、榮耀、認可、自信', d: '你克服了挑戰，取得了顯著的成功，並獲得了他人的讚賞與認可。這是一個充滿自信與榮耀的時刻。', a: '享受你的勝利與他人的肯定，但請保持謙遜，繼續帶領大家前進。' },
          { k: '防禦、堅持、挑戰、信念', d: '你處於一個有利的位置，但也面臨著挑戰或競爭者的攻擊。你有能力堅守陣地，捍衛自己的立場。', a: '堅持你的信念與立場，不要輕易退縮，你有足夠的力量抵禦外敵。' },
          { k: '迅速、行動、變化、消息', d: '事情正在極速發展，障礙已經消除。這象徵著迅速的行動、旅行，或是有重要消息即將飛快傳來。', a: '準備好迎接快速的變動，把握時機，果斷行動，不要拖延。' },
          { k: '疲憊、堅持、防禦、韌性', d: '你經歷了許多戰鬥，感到疲憊且充滿戒心。但你已經具備了足夠的經驗與韌性，這是最後的考驗。', a: '咬緊牙關撐過這最後一關，你的經驗會保護你，勝利就在眼前。' },
          { k: '負擔、壓力、責任、過勞', d: '你承擔了過多的責任與壓力，雖然已經接近目標，遇到過程讓你感到喘不過氣。', a: '學會放下不必要的負擔，適時尋求幫助或重新分配工作，不要硬撐。' },
          { k: '消息、熱情、探索、新點子', d: '一個充滿好奇心與熱情的新開始。你可能獲得了新的靈感，或是收到令人興奮的消息。', a: '擁抱你內心的小孩，對新事物保持熱忱與探索的勇氣。' },

      Object.keys(minorContent).forEach(suitKey => {
        minorContent[suitKey].forEach((content, index) => {
          const rankInfo = ranksList[index];
          deck.push({
            id: deck.length,
            numeral: rankInfo.r,
            name: `${suitsData[suitKey].name}${rankInfo.n}`,
            en: `${rankInfo.e} of ${suitKey}`,
            keywords: content.k,
            description: content.d,
            symbol: suitsData[suitKey].symbol,
            advice: content.a,

    const FULL_DECK = generateDeck();

    const CardBack = ({ className = "" }) => (
      <div className={`relative w-full h-full bg-[#FDF6E3] p-1.5 shadow-sm flex flex-col items-center ${className}`}>
        <div className="w-full h-full border-2 border-double border-[#8B7355] flex flex-col items-center justify-center relative bg-opacity-50 overflow-hidden"
             style={{ backgroundImage: 'radial-gradient(circle at center, transparent 0%, rgba(210, 180, 140, 0.08) 100%)' }}>
          <div className="absolute inset-0 flex flex-col items-center justify-center text-[#8B7355] z-10">
            <span className="text-3xl md:text-4xl drop-shadow-md leading-none font-light">✦</span>
          </div>
        </div>
      </div>
    );

    const CardFront = ({ card }) => (
      <div className="relative w-full h-full bg-[#FDF6E3] p-2 shadow-xl flex flex-col items-center">
        <div className="w-full h-full border-2 border-double border-[#8B7355] flex flex-col items-center justify-center p-3 bg-opacity-50 overflow-hidden relative"
             style={{ backgroundImage: 'radial-gradient(circle at center, transparent 0%, rgba(210, 180, 140, 0.08) 100%)' }}>
          
          <div className="absolute top-4 md:top-6 text-[#5C4033] text-lg md:text-xl font-bold tracking-widest border-b border-[#8B7355]/50 pb-1 px-3">
            {card.numeral}
          </div>
          
          <div className="flex flex-col items-center justify-center my-auto">
            <div className="text-[#4A3B32] text-xl md:text-3xl font-bold tracking-widest whitespace-nowrap mb-2">
              {card.name}
            </div>
            <div className="text-[#8B7355] text-xs md:text-sm tracking-widest uppercase font-sans">
              {card.en}
            </div>
          </div>
          
          <div className="absolute bottom-4 md:bottom-6 text-[#8B7355]/50 text-[0.65rem] md:text-xs tracking-widest uppercase">
            FF tarot
          </div>
        </div>
      </div>
    );

    function App() {
      const [step, setStep] = useState('home');
      const [isFading, setIsFading] = useState(false);
      
      const [breathPhase, setBreathPhase] = useState('inhale');
      const [breathText, setBreathText] = useState('請跟隨光暈深呼吸...');

      const [fanCards, setFanCards] = useState([]); 
      const [pickedCard, setPickedCard] = useState(null);

      const transitionTo = (nextStep, delay = 1000) => {
        setIsFading(true);
        setTimeout(() => {
          setStep(nextStep);
          setIsFading(false);
        }, delay);
      };

      const handleStart = () => {
        setPickedCard(null);
        transitionTo('meditation', 800);
      };

      const handleSkipMeditation = () => {
        setIsFading(true);
        setTimeout(() => {
          const shuffled = [...FULL_DECK].sort(() => Math.random() - 0.5);
          const fanned = shuffled.slice(0, 21).map((card, i) => ({
            card,
            isSelected: false,
            uniqueId: `fan-${i}`
          }));
          setFanCards(fanned);
          setStep('fanning');
          setIsFading(false);
        }, 300);
      };

      useEffect(() => {
        if (step === 'meditation') {
          let isSubscribed = true;
          const sequence = async () => {
            setBreathPhase('inhale');
            setBreathText('緩慢地深呼吸...');
            await new Promise(r => setTimeout(r, 4000));
            if (!isSubscribed) return;
            
            setBreathPhase('exhale');
            setBreathText('緩慢地吐氣...');
            await new Promise(r => setTimeout(r, 4000));
            if (!isSubscribed) return;

            setBreathPhase('inhale');
            setBreathText('放下雜念...');
            await new Promise(r => setTimeout(r, 3500));
            if (!isSubscribed) return;

            setBreathText('內心回歸平靜。');
            await new Promise(r => setTimeout(r, 1500));
            if (isSubscribed) {
              const shuffled = [...FULL_DECK].sort(() => Math.random() - 0.5);
              const fanned = shuffled.slice(0, 21).map((card, i) => ({
                card,
                isSelected: false,
                uniqueId: `fan-${i}`
              }));
              
              setFanCards(fanned);
              transitionTo('fanning', 1000);
            }
          };
          sequence();
          return () => { isSubscribed = false; };
        }
      }, [step]);

      const handleSelectCard = (fanCardItem) => {
        if (fanCardItem.isSelected || pickedCard) return;

        const updatedFan = fanCards.map(f => 
          f.uniqueId === fanCardItem.uniqueId ? { ...f, isSelected: true } : f
        );
        setFanCards(updatedFan);
        setPickedCard(fanCardItem.card);

        setTimeout(() => {
          transitionTo('result', 1500);
        }, 1200);
      };

      const handleReset = () => {
        setIsFading(true);
        setTimeout(() => {
          setPickedCard(null);
          setFanCards([]);
          setStep('home');
          setIsFading(false);
        }, 800);
      };

      const generateDynamicReading = (card) => {
        const elementMeaning = elementData[card.element] || '';
        const numMeaning = card.element !== 'Major' ? (numerologyData[card.rank] || '') : '';

        return (
          <div className="text-[#5C4033] leading-loose tracking-wide text-justify text-sm space-y-6 mt-2 pt-2">
            <div>
              <h5 className="text-[#B8860B] font-bold border-b border-[#D2B48C]/30 pb-2 mb-3 flex items-center gap-2">
                <span className="text-sm">✦</span> 核心牌義
              </h5>
              <p>
                <strong className="text-[#8B7355] mr-1">關鍵字：{card.keywords}</strong><br/>
                {card.description}
              </p>
            </div>

            <div>
              <h5 className="text-[#B8860B] font-bold border-b border-[#D2B48C]/30 pb-2 mb-3 flex items-center gap-2">
                <span className="text-sm">✦</span> 能量頻率
              </h5>
              <p>
                {elementMeaning} {numMeaning}
              </p>
            </div>

            <div className="mt-8 p-5 md:p-6 bg-white border border-[#D2B48C]/50 rounded-xl text-center shadow-sm">
              <h5 className="text-[#B8860B] font-bold tracking-widest text-sm mb-4">✧ 今日療癒與幸運 ✧</h5>
              <p className="text-[#6B5B4D] text-[1rem] mb-5 italic font-medium">
                「{healingQuotes[card.id % healingQuotes.length]}」
              </p>
              <div className="flex justify-center items-center gap-3 md:gap-5 text-xs md:text-sm text-[#8B7355] bg-[#FAF7F2] py-2 px-4 md:px-6 rounded-full inline-flex mx-auto border border-[#D2B48C]/20 whitespace-nowrap flex-nowrap">
                <span className="whitespace-nowrap shrink-0">幸運數字：<strong className="text-[#5C4033] text-base md:text-lg">{(card.id % 9) + 1}</strong></span>
                <span className="w-px bg-[#D2B48C]/50 h-5 my-auto shrink-0"></span>
                <span className="whitespace-nowrap shrink-0">幸運色：<strong className="text-[#5C4033] text-base md:text-lg">{luckyColors[card.id % luckyColors.length]}</strong></span>
              </div>
            </div>
          </div>
        );
      };

      const generateOverallAdvice = () => {
        if (!pickedCard) return null;
        return (
          <div className="space-y-3">
            <p className="text-[#B8860B] text-lg md:text-xl font-bold leading-relaxed">
              「{pickedCard.advice}」
            </p>
            <p className="text-[#5C4033] text-sm md:text-base">
              請將這份指引轉化為實際行動，帶著平靜與自信展開今天。
            </p>
          </div>
        );
      };

      return (
        <div className="w-full h-full relative">
          
          {step !== 'home' && (
            <div className="fixed top-0 left-0 w-full bg-[#FAF7F2]/90 backdrop-blur-md z-[100] px-4 py-3 md:px-8 flex justify-between items-center shadow-sm">
              <div 
                className="text-[#B8860B] font-bold tracking-widest text-lg cursor-pointer hover:opacity-80 transition-opacity" 
                onClick={handleReset}
              >
                FF tarot
              </div>
              <button 
                onClick={handleReset}
                className="px-4 py-2 text-[#8B7355] rounded-full hover:bg-[#FDF6E3] hover:text-[#5C4033] transition-all duration-300 tracking-widest text-sm font-medium flex items-center gap-2 group"
              >
                <span className="group-hover:-rotate-180 transition-transform duration-500">↻</span> 重新開始
              </button>
            </div>
          )}

          <div className={`w-full min-h-screen flex flex-col items-center justify-center p-4 pt-16 md:pt-20 transition-opacity duration-1000 ease-in-out ${isFading ? 'opacity-0' : 'opacity-100'}`}>
            
            {step === 'home' && (
              <div className="flex flex-col items-center justify-center text-center space-y-12 w-full max-w-lg mt-4">
                <div className="space-y-4 mb-8">
                  <h1 className="text-5xl md:text-6xl tracking-widest text-[#B8860B] font-light drop-shadow-sm">
                    FF tarot
                  </h1>
                  <h2 className="text-lg md:text-xl tracking-[0.3em] text-[#8B7355] font-light">
                    每日療癒指引
                  </h2>
                </div>
                
                <p className="text-[#6B5B4D] text-sm tracking-widest leading-loose">
                  在明亮與溫暖中尋找平靜，<br/>宇宙正在等待為您揭曉今日的專屬頻率。
                </p>
                
                <button 
                  onClick={handleStart}
                  className="w-full md:w-3/4 mt-4 px-8 py-5 bg-[#FDF6E3] border border-[#D2B48C] text-[#8B7355] rounded-xl hover:bg-[#F5DEB3] hover:-translate-y-1 transition-all duration-300 shadow-sm flex flex-col items-center gap-2 group mx-auto"
                >
                  <span className="text-xl md:text-2xl font-bold tracking-widest flex items-center justify-center gap-3">
                    <span className="text-[#C19A6B] text-lg md:text-xl transition-transform group-hover:rotate-180 duration-500">✦</span>
                    開始接收今日指引
                    <span className="text-[#C19A6B] text-lg md:text-xl transition-transform group-hover:rotate-180 duration-500">✦</span>
                  </span>
                </button>
              </div>
            )}

            {step === 'meditation' && (
              <>
                <div className="flex flex-col items-center justify-center w-full text-center flex-grow">
                  <div className="relative w-48 h-48 flex items-center justify-center mb-12">
                  <div 
                    className={`absolute inset-0 rounded-full bg-[radial-gradient(circle_at_center,rgba(210,180,140,0.3)_0%,transparent_70%)] transition-transform duration-[4000ms] ease-in-out ${breathPhase === 'inhale' ? 'scale-150 opacity-80' : 'scale-75 opacity-30'}`}
                  ></div>
                  <div 
                    className={`absolute inset-4 rounded-full border border-[#D2B48C]/40 transition-transform duration-[4000ms] ease-in-out ${breathPhase === 'inhale' ? 'scale-125' : 'scale-90'}`}
                  ></div>
                  <span className="text-[#C19A6B] text-4xl opacity-80 drop-shadow-md relative z-10">✦</span>
                </div>
                <p className="text-[#8B7355] text-xl tracking-widest transition-opacity duration-1000">
                  {breathText}
                </p>
              </div>
              
              {/* 呼吸階段右下角 SKIP 按鈕 (線條箭頭) */}
              <button 
                onClick={handleSkipMeditation}
                className="fixed bottom-8 right-6 md:bottom-12 md:right-12 z-[100] px-4 py-2 text-[#8B7355] rounded-full hover:bg-[#FDF6E3] hover:text-[#5C4033] transition-all duration-300 text-2xl font-light flex items-center justify-center group"
              >
                <span className="group-hover:translate-x-1 transition-transform duration-500">→</span>
              </button>
            </>
          )}

          {step === 'fanning' && (
            <div className="flex flex-col items-center justify-center w-full h-full flex-grow mt-4 md:mt-8 max-w-5xl gap-10 md:gap-16 pt-8 pb-20">
                <div className="flex flex-col items-center w-full">
                  <h3 className="text-[#8B7355] tracking-widest mb-2 text-base md:text-lg italic opacity-80">【每日指引】</h3>
                  <p className="text-[#B8860B] tracking-widest mb-4 text-sm">
                    請憑直覺，抽取一張牌
                  </p>
                  
                  <div className="flex justify-center min-h-[6rem] md:min-h-[10rem]">
                    <div className="w-16 h-24 md:w-24 md:h-36 border-2 border-dashed border-[#D2B48C]/50 rounded-md flex flex-col items-center justify-center relative bg-[#FAF7F2]/30 mt-4">
                      {pickedCard && (
                         <div className="absolute inset-0 animate-[fadeIn_0.5s_ease-in-out]">
                            <CardBack />
                         </div>
                      )}
                    </div>
                  </div>
                </div>
                
                <div className="relative w-full max-w-lg h-48 md:h-64 flex justify-center items-end overflow-visible">
                  {fanCards.map((item, index) => {
                    const totalCards = fanCards.length;
                    const centerIndex = (totalCards - 1) / 2;
                    const offset = index - centerIndex;
                    // 調整扇形弧度 (將 y 偏移量縮小，角度放緩)
                    const angle = offset * 2.5; 
                    const x = offset * 15; 
                    const y = Math.pow(offset, 2) * 0.4; 
                    const isHidden = item.isSelected;

                    return (
                      <div 
                        key={item.uniqueId}
                        onClick={() => handleSelectCard(item)}
                        className={`absolute bottom-0 w-16 h-24 md:w-24 md:h-36 transition-all duration-500 origin-bottom 
                          ${isHidden ? 'opacity-0 scale-50 pointer-events-none' : 'cursor-pointer hover:-translate-y-10 hover:scale-125 shadow-sm hover:shadow-xl hover:z-50'}`}
                        style={{
                          transform: isHidden ? `translateX(${x}px) translateY(-50px)` : `translateX(${x}px) translateY(${y}px) rotate(${angle}deg)`,
                          zIndex: isHidden ? 0 : 10 + index,
                        }}
                      >
                        <CardBack className="transition-transform duration-300" />
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {step === 'result' && pickedCard && (
              <div className="flex flex-col items-center w-full max-w-5xl mx-auto py-4 md:py-8">
                
                {/* ======= 解析結果可見區塊 ======= */}
                <div className="flex flex-col items-center w-full max-w-2xl px-4 py-8 bg-[#FAF7F2] rounded-3xl">
                  <div className="text-center mb-8 w-full">
                    <p className="text-[#8B7355] tracking-widest text-sm mb-3">— 宇宙給您的專屬指引 —</p>
                  </div>

                  <div className="relative w-64 h-96 md:w-72 md:h-[27rem] mb-8">
                    <CardFront card={pickedCard} />
                  </div>

                  <div className="bg-white/60 p-6 md:p-8 rounded-2xl shadow-sm border border-[#E8DCC4]/50 w-full flex flex-col">
                    <div className="text-center mb-4 pb-2">
                      <h4 className="text-[#B8860B] text-2xl md:text-3xl tracking-widest font-bold mb-4">
                        {pickedCard.name}
                      </h4>
                      <div className="flex flex-wrap justify-center gap-2">
                        {pickedCard.keywords.split('、').map((kw, i) => (
                          <span key={i} className="px-4 py-1.5 bg-[#F5DEB3]/30 text-[#6B5B4D] rounded-full text-xs md:text-sm tracking-wider border border-[#D2B48C]/50">
                            {kw}
                          </span>
                        ))}
                      </div>
                    </div>
                    <div className="text-justify">
                      {generateDynamicReading(pickedCard)}
                    </div>
                  </div>
                </div>

                <div className="w-full max-w-4xl mt-10 px-6 py-8 bg-[#FDF6E3]/80 border-t-4 border-[#D2B48C] rounded-lg shadow-sm text-center flex flex-col items-center">
                   <h4 className="text-[#B8860B] text-xl tracking-widest font-bold mb-4 flex items-center justify-center gap-2">
                     <span>✦</span> 總結建議 <span>✦</span>
                   </h4>
                   <div className="text-[#5C4033] leading-loose tracking-wide text-sm md:text-base max-w-3xl mx-auto w-full">
                     {generateOverallAdvice()}
                   </div>
                </div>

                <div className="flex flex-col w-full max-w-sm justify-center items-center mt-12 mb-8 px-4">
                  <button 
                    onClick={handleReset}
                    className="w-full px-10 py-3 bg-transparent text-[#8B7355] border border-[#D2B48C] rounded-full hover:bg-[#FDF6E3] hover:text-[#B8860B] transition-all duration-500 tracking-widest shadow-sm focus:outline-none"
                  >
                    心懷感激，結束占卜
                  </button>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
